<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuestionQuest</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0a2540, #1a6bb5);
      color: white;
    }
    .card {
      background: white;
      color: #0a2540;
      width: 420px;
      max-width: 92vw;
      border-radius: 16px;
      padding: 36px;
      box-shadow: 0 24px 64px rgba(0,0,0,.25);
      text-align: center;
    }
    h1 {
      margin-bottom: 8px;
    }
    p {
      color: #6b7f96;
      line-height: 1.5;
      margin-bottom: 24px;
    }
    a {
      display: block;
      text-decoration: none;
      background: #1a6bb5;
      color: white;
      padding: 14px;
      border-radius: 8px;
      font-weight: 700;
      margin-top: 12px;
    }
    a.secondary {
      background: #0a2540;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>QuestionQuest</h1>
    <p>Online assessment portal for students, admins, and evaluators.</p>

    <a href="/frontend/index.html">Student Portal</a>
    <a class="secondary" href="/admin/admin.html">Admin Portal</a>
  </div>
</body>
</html>
